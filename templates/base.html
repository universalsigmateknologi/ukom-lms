{% load static %}
<!DOCTYPE html>
<html class="{% block html_class %}light{% endblock %}" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}ACADEMIA{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#fcf9f8",
                        "secondary-fixed": "#dfe0ff",
                        "secondary-fixed-dim": "#c0c3f2",
                        "on-secondary": "#ffffff",
                        "secondary": "#575b84",
                        "on-tertiary-fixed-variant": "#673d00",
                        "on-secondary-fixed": "#13183d",
                        "outline": "#767684",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#313030",
                        "surface": "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "surface-dim": "#dcd9d9",
                        "tertiary-fixed": "#ffddbb",
                        "on-tertiary-container": "#fffaf8",
                        "tertiary-fixed-dim": "#ffb867",
                        "surface-tint": "#4854bb",
                        "primary-container": "#5e6ad2",
                        "surface-container-lowest": "#ffffff",
                        "on-primary-container": "#fdfaff",
                        "on-secondary-container": "#52577f",
                        "surface-variant": "#e5e2e1",
                        "outline-variant": "#c6c5d5",
                        "secondary-container": "#cbcefe",
                        "primary": "#4450b7",
                        "on-primary": "#ffffff",
                        "tertiary": "#834f00",
                        "surface-container-low": "#f6f3f2",
                        "on-background": "#1c1b1b",
                        "surface-container": "#f0edec",
                        "on-surface-variant": "#454652",
                        "on-secondary-fixed-variant": "#3f446b",
                        "on-error": "#ffffff",
                        "error-container": "#ffdad6",
                        "background": "#fcf9f8",
                        "surface-container-highest": "#e5e2e1",
                        "surface-container-high": "#ebe7e7",
                        "on-primary-fixed": "#000965",
                        "on-primary-fixed-variant": "#2e3aa2",
                        "primary-fixed": "#dfe0ff",
                        "tertiary-container": "#a56500",
                        "inverse-primary": "#bdc2ff",
                        "inverse-on-surface": "#f3f0ef",
                        "error": "#ba1a1a",
                        "primary-fixed-dim": "#bdc2ff",
                        "on-tertiary-fixed": "#2b1700",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "section-gap": "80px",
                        "container-max": "1280px",
                        "unit": "4px",
                        "margin-mobile": "16px",
                        "margin-desktop": "48px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-sm": ["JetBrains Mono"],
                        "body-lg": ["Inter"],
                        "label-xs": ["JetBrains Mono"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "display": ["Inter"],
                        "headline-lg-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "body-md": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                        "label-xs": ["10px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "400"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "1.4", "letterSpacing": "-0.01em", "fontWeight": "500"}],
                        "display": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e5e2e1; }
        ::-webkit-scrollbar-thumb:hover { background: #767684; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-surface text-on-surface font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed {% block body_class %}{% endblock %}">
    {% block content %}{% endblock %}
    {% block extra_js %}{% endblock %}
</body>
</html>
